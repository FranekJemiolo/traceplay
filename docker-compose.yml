version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: traceplay-postgres
    environment:
      POSTGRES_USER: traceplay
      POSTGRES_PASSWORD: traceplay
      POSTGRES_DB: traceplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: traceplay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: traceplay-backend
    environment:
      DATABASE_URL: postgresql://traceplay:traceplay@postgres:5432/traceplay
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: traceplay-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traceplay-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
